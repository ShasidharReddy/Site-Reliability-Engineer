# loki-production.yaml
# Production-oriented Loki single-tenant configuration.
# `auth_enabled: false` is appropriate for a single trusted tenant inside one platform.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /var/loki
  replication_factor: 3
  ring:
    kvstore:
      # Memberlist keeps the ring self-contained inside Kubernetes.
      store: memberlist
  storage:
    # GCS is used for durable chunks and index sharing across replicas.
    gcs:
      bucket_name: sre-loki-prod-us-central1
  compactor_address: http://loki-compactor.monitoring.svc.cluster.local:3100

memberlist:
  join_members:
    - loki-memberlist.monitoring.svc.cluster.local:7946

ingester:
  lifecycler:
    ring:
      replication_factor: 3
    final_sleep: 0s
  wal:
    enabled: true
    dir: /var/loki/wal
    replay_memory_ceiling: 1GB
  # Chunk sizing balances memory use with object-store request overhead.
  chunk_idle_period: 5m
  chunk_target_size: 1572864
  max_chunk_age: 1h
  chunk_retain_period: 30s
  chunk_encoding: snappy

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: gcs
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /var/loki/index
    cache_location: /var/loki/boltdb-cache
    cache_ttl: 24h
    shared_store: gcs
  gcs:
    bucket_name: sre-loki-prod-us-central1
  filesystem:
    # Local filesystem remains useful for caches, ruler scratch space,
    # and lab-mode fallback even when chunks live in GCS.
    directory: /var/loki/chunks

limits_config:
  ingestion_rate_mb: 24
  ingestion_burst_size_mb: 48
  max_streams_per_user: 250000
  retention_period: 30d
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  split_queries_by_interval: 15m
  query_timeout: 2m
  max_cache_freshness_per_query: 10m
  volume_enabled: true

chunk_store_config:
  max_look_back_period: 720h

query_range:
  align_queries_with_step: true
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 512
        ttl: 24h

frontend:
  compress_responses: true
  log_queries_longer_than: 5s
  downstream_url: http://loki-query-frontend.monitoring.svc.cluster.local:3100

compactor:
  working_directory: /var/loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: gcs

ruler:
  enable_api: true
  enable_alertmanager_v2: true
  alertmanager_url: http://alertmanager-operated.monitoring.svc.cluster.local:9093
  rule_path: /var/loki/rules-temp
  storage:
    type: local
    local:
      directory: /etc/loki/rules
  ring:
    kvstore:
      store: memberlist
  wal:
    dir: /var/loki/ruler-wal

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h
