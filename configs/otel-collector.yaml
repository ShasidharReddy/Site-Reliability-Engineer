# otel-collector.yaml
# OpenTelemetry Collector configuration for production Kubernetes platforms.
# The collector accepts traces, metrics, and logs and forwards them to the
# observability backends already provisioned in the cluster.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 32
      http:
        endpoint: 0.0.0.0:4318
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268
      thrift_compact:
        endpoint: 0.0.0.0:6831
      thrift_binary:
        endpoint: 0.0.0.0:6832
  zipkin:
    endpoint: 0.0.0.0:9411

processors:
  memory_limiter:
    # Keep the collector healthy under bursty telemetry so it sheds load
    # before the container itself is OOM-killed.
    check_interval: 1s
    limit_mib: 1536
    spike_limit_mib: 512
  resourcedetection:
    # Detect environment metadata without overwriting app-provided labels.
    detectors: [env, system, gcp]
    timeout: 2s
    override: false
  batch:
    timeout: 5s
    send_batch_size: 8192
    send_batch_max_size: 10000

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464
    namespace: otelcol
    const_labels:
      cluster: gke-prod-us-central1
      environment: production
  loki:
    endpoint: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
    tls:
      insecure: true
    default_labels_enabled:
      exporter: true
      job: true
      instance: true
      level: true
  otlp/tempo:
    endpoint: tempo-distributor.monitoring.svc.cluster.local:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 20000

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [loki]
