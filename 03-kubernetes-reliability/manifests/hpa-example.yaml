# Horizontal Pod Autoscaler — v2 with CPU, memory, and stabilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3       # Never go below 3 (HA minimum)
  maxReplicas: 50      # Hard ceiling
  metrics:
  # Scale on CPU utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60    # Target 60% CPU across all pods
  # Also scale on memory (optional)
  - type: Resource
    resource:
      name: memory
      target:
        type: AverageValue
        averageValue: "400Mi"     # Scale up if avg memory > 400Mi per pod
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s to confirm scale-up needed
      policies:
      - type: Percent
        value: 100               # Can double pod count per interval
        periodSeconds: 15
      - type: Pods
        value: 4                 # Or add at most 4 pods per interval
        periodSeconds: 15
      selectPolicy: Max          # Use whichever policy adds more pods
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 10                # Remove at most 10% of pods per minute
        periodSeconds: 60
