autoDiscovery:
  clusterName: sre-lab
awsRegion: us-east-1
rbac:
  create: true
extraArgs:
  balance-similar-node-groups: "true"
  expander: least-waste
  scan-interval: 10s
  skip-nodes-with-local-storage: "false"
  skip-nodes-with-system-pods: "false"
  scale-down-delay-after-add: 10m
  scale-down-unneeded-time: 10m
resources:
  requests:
    cpu: 100m
    memory: 300Mi
  limits:
    cpu: 500m
    memory: 600Mi
podDisruptionBudget:
  maxUnavailable: 1
