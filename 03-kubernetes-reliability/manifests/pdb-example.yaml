# Advanced PodDisruptionBudget examples for stateless and stateful workloads
# Apply with: kubectl apply -f manifests/pdb-example.yaml

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-web-pdb
  namespace: production
  labels:
    app: web
    tier: frontend
spec:
  # Use an absolute value when the minimum safe capacity is fixed.
  minAvailable: 2
  selector:
    matchLabels:
      app: web
      tier: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: production
  labels:
    app: api
    tier: backend
spec:
  # Use a percentage when the Deployment replica count changes often.
  maxUnavailable: "25%"
  selector:
    matchLabels:
      app: api
      tier: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: production
  labels:
    app: postgres
    workload: stateful
spec:
  # Stateful workloads need budgets aligned to quorum or failover behavior.
  maxUnavailable: 1
  selector:
    matchLabels:
      app: postgres
      workload: stateful
